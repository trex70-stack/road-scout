<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 432 432">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="road" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="432" height="432" rx="96" fill="url(#bg)"/>

  <!-- Road perspective -->
  <path d="M 160 432 L 200 200 L 232 200 L 272 432 Z" fill="url(#road)" opacity="0.9"/>
  <!-- Road center line -->
  <path d="M 216 432 L 216 210" stroke="#FBBF24" stroke-width="6" stroke-dasharray="20 16" opacity="0.8"/>

  <!-- Speed limit sign (red circle, white interior) -->
  <circle cx="216" cy="160" r="72" fill="#DC2626" stroke="#fff" stroke-width="8"/>
  <circle cx="216" cy="160" r="56" fill="#fff"/>

  <!-- Number inside sign -->
  <text x="216" y="178" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="900" fill="#1E3A5F" text-anchor="middle">70</text>

  <!-- Detection bracket corners (top-left) -->
  <path d="M 48 48 L 48 88 M 48 48 L 88 48" stroke="#10B981" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Detection bracket corners (top-right) -->
  <path d="M 384 48 L 384 88 M 384 48 L 344 48" stroke="#10B981" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Detection bracket corners (bottom-left) -->
  <path d="M 48 384 L 48 344 M 48 384 L 88 384" stroke="#10B981" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Detection bracket corners (bottom-right) -->
  <path d="M 384 384 L 384 344 M 384 384 L 344 384" stroke="#10B981" stroke-width="8" stroke-linecap="round" fill="none"/>
</svg>
